name: Deploy course site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      # ── Astro site ────────────────────────────────────────────
      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        env:
          ASTRO_TELEMETRY_DISABLED: "1"
        run: npm run build

      # ── Blazor WASM runner ────────────────────────────────────
      - name: Determine runner base path
        id: base
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "path=/runner/" >> $GITHUB_OUTPUT
          else
            echo "path=/${REPO}/runner/" >> $GITHUB_OUTPUT
          fi

      - name: Set runner base href
        run: |
          sed -i "s|<base href=\"/runner/\" />|<base href=\"${{ steps.base.outputs.path }}\" />|" runner/wwwroot/index.html

      - name: Build Blazor runner
        working-directory: runner
        run: dotnet publish -c Release -o ../site/dist/runner

      # Blazor publish кладе файли в publish/wwwroot — переміщаємо
      - name: Move runner output
        run: |
          if [ -d "site/dist/runner/wwwroot" ]; then
            cp -r site/dist/runner/wwwroot/. site/dist/runner/
            rm -rf site/dist/runner/wwwroot
          fi

      # ── Deploy ────────────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
