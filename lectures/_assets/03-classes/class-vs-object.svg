  <text x="445" y="128" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#a5d6ff">32</text>

  <!-- === OBJECT 2 (bottom right) === -->
  <rect x="370" y="160" width="310" height="110" rx="8" fill="#1e2430" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="370" y="160" width="310" height="36" rx="8" fill="#1e3a22"/>
  <rect x="370" y="184" width="310" height="12" fill="#1e3a22"/>
