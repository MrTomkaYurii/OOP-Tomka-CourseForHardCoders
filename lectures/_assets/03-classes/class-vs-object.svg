  <rect x="370" y="30" width="310" height="110" rx="8" fill="#1e2430" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="370" y="30" width="310" height="36" rx="8" fill="#1e3a22"/>
  <rect x="370" y="54" width="310" height="12" fill="#1e3a22"/>
