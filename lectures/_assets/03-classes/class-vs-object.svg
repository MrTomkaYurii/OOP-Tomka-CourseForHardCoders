  <text x="390" y="92" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#79c0ff">Name</text>
  <text x="440" y="92" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#8b949e"> = </text>
  <text x="460" y="92" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#a5d6ff">"Олена Коваль"</text>
  <text x="390" y="110" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#79c0ff">Phone</text>
  <text x="445" y="110" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#8b949e"> = </text>
  <text x="465" y="110" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#a5d6ff">"0501234567"</text>
  <text x="390" y="128" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#79c0ff">Age</text>
