  <text x="48" y="162" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#79c0ff">Age</text>
  <text x="95" y="162" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#8b949e">: int</text>
  <!-- divider -->
  <line x1="30" y1="175" x2="220" y2="175" stroke="#30363d" stroke-width="1"/>
  <!-- method -->
  <text x="48" y="200" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#d2a8ff">Display()</text>
  <text x="48" y="216" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#d2a8ff">ToString()</text>

  <!-- === ARROWS === -->
  <!-- Arrow to object 1 -->
  <path d="M 220 100 Q 310 100 360 90" stroke="#388bfd" stroke-width="1.5" fill="none" stroke-dasharray="5,4" opacity="0.6"/>
  <polygon points="358,85 368,90 358,95" fill="#388bfd" opacity="0.6"/>
  <text x="265" y="90" font-family="'Consolas','Courier New',monospace" font-size="11" fill="#58a6ff">new Patient()</text>

  <!-- Arrow to object 2 -->
