  <rect x="30" y="72" width="190" height="16" fill="#388bfd"/>
  <text x="125" y="74" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-size="15" font-weight="bold" fill="#fff">Patient</text>
  <text x="125" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cce0ff" opacity="0.7">клас · шаблон</text>
  <!-- fields -->
  <text x="48" y="118" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#79c0ff">Name</text>
