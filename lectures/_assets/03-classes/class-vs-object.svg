<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300">
  <rect width="720" height="300" fill="#161b22" rx="12"/>

  <!-- === CLASS TEMPLATE (left) === -->
  <rect x="30" y="50" width="190" height="185" rx="8" fill="#1e2430" stroke="#388bfd" stroke-width="2"/>
