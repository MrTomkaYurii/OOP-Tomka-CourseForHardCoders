  <text x="390" y="222" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#79c0ff">Name</text>
  <text x="440" y="222" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#8b949e"> = </text>
  <text x="460" y="222" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#a5d6ff">"Михайло Бондар"</text>
  <text x="390" y="240" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#79c0ff">Phone</text>
  <text x="445" y="240" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#8b949e"> = </text>
  <text x="465" y="240" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#a5d6ff">"0671234567"</text>
  <text x="390" y="258" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#79c0ff">Age</text>
  <text x="425" y="258" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#8b949e"> = </text>
